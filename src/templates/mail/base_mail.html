<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: #333;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      background-color: #007bff;
      color: white;
      padding: 16px 20px;
      border-radius: 4px 4px 0 0;
    }

    .header h2 {
      margin: 0;
      font-size: 18px;
    }

    .content {
      border: 1px solid #ddd;
      border-top: none;
      padding: 20px;
      border-radius: 0 0 4px 4px;
    }

    .info-box {
      background-color: #f5f5f5;
      border-left: 4px solid #003366;
      padding: 12px 16px;
      margin: 16px 0;
      border-radius: 0 4px 4px 0;
    }

    .info-box table {
      border-collapse: collapse;
      width: 100%;
    }

    .info-box td {
      padding: 4px 8px;
      vertical-align: top;
    }

    .info-box td:first-child {
      font-weight: bold;
      white-space: nowrap;
      width: 80px;
      color: #555;
    }

    .warning {
      background-color: #fff8e1;
      border: 1px solid #f0c040;
      padding: 10px 14px;
      border-radius: 4px;
      margin: 16px 0;
      font-size: 13px;
      color: #7a5c00;
    }

    .btn {
      display: inline-block;
      padding: 10px 24px;
      color: white !important;
      text-decoration: none;
      cursor: pointer;
      border-radius: 8px;
      font-weight: bold;
      font-size: 14px;
      margin-top: 8px;
    }


    .btn-primary {
      background-color: #007bff;
      color: white;
      margin: 5px 0;
    }

    .btn-primary:hover {
      background-color: #0069d9;
      transform: scale(1.03);
    }

    .btn-danger {
      background-color: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background-color: #c82333;
      transform: scale(1.03);
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #999;
      border-top: 1px solid #eee;
      padding-top: 12px;
    }
  </style>
</head>

{% block content %}

{% endblock %}

</html>
